<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #ffffff;
            --pencil: #ebebeb;
            --graphite: #a8a8a8;
            --ink: #252525;
            --font: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --ease: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: var(--font);
            background: var(--paper);
            color: var(--ink);
            font-size: 15px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-kerning: normal;
        }

        .shell {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 32px;
            max-width: 960px;
            margin: 0 auto;
            padding: 64px 32px;
        }

        aside {
            position: sticky;
            top: 64px;
            height: fit-content;
        }

        aside h1 {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.02em;
            line-height: 1.4;
        }

        aside p {
            font-size: 12px;
            color: var(--graphite);
            line-height: 1.4;
            margin-top: 8px;
        }

        main {
            min-width: 0;
        }

        h3 {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.02em;
            line-height: 1.4;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--pencil);
        }

        h4 {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.02em;
            line-height: 1.4;
            margin-top: 32px;
            margin-bottom: 8px;
        }

        p {
            margin-bottom: 16px;
        }

        a {
            color: var(--ink);
            text-decoration: underline;
            text-underline-offset: 0.15em;
        }

        a:hover {
            color: var(--graphite);
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0 0 32px 0;
        }

        li {
            margin-bottom: 32px;
            font-size: 15px;
            color: var(--graphite);
            line-height: 1.4;
        }

        li a {
            color: var(--ink);
            text-decoration: none;
            font-weight: 500;
            letter-spacing: -0.01em;
            transition: color 150ms var(--ease);
        }

        li a:hover {
            color: var(--graphite);
        }

        li a:focus-visible {
            outline: 1px solid var(--pencil);
            outline-offset: 2px;
            border-radius: 2px;
        }

        pre, div.highlight {
            position: relative;
        }

        pre {
            border: 1px solid var(--pencil);
            padding: 16px;
            overflow-x: auto;
            background: var(--paper);
            margin-bottom: 32px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            line-height: 1.5;
            color: var(--ink);
        }

        div.highlight {
            border: 1px solid var(--pencil);
            padding: 16px;
            overflow-x: auto;
            background: var(--paper);
            margin-bottom: 32px;
        }

        div.highlight pre {
            border: none;
            padding: 0;
            margin: 0;
        }

        code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            color: var(--ink);
        }

        p code, li code {
            border: 1px solid var(--pencil);
            padding: 2px 4px;
        }

        pre code {
            border: none;
            padding: 0;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--paper);
            border: 1px solid var(--pencil);
            border-radius: 8px;
            cursor: pointer;
            color: var(--ink);
            padding: 0;
            transition: color 150ms var(--ease), border-color 150ms var(--ease);
        }

        .copy-btn:hover {
            color: var(--graphite);
            border-color: var(--graphite);
        }

        .copy-btn:focus-visible {
            outline: 1px solid var(--pencil);
            outline-offset: 2px;
        }

        .copy-btn svg {
            width: 16px;
            height: 16px;
            display: block;
            pointer-events: none;
        }

        @media (max-width: 640px) {
            .shell {
                grid-template-columns: 1fr;
                padding: 32px 20px;
            }

            aside {
                position: static;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            li a, .copy-btn {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <aside>
            <h1>{{ site.title }}</h1>
            <p>{{ site.description }}</p>
        </aside>
        <main>
            {{ content }}
        </main>
    </div>

    <script>
        const COPY_ICON = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="m13,7h2c1.105,0,2,.895,2,2v6c0,1.105-.895,2-2,2h-6c-1.105,0-2-.895-2-2v-2" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><rect x="3" y="3" width="10" height="10" rx="2" ry="2" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></rect></svg>`;

        const CHECK_ICON = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none"><polyline points="4 11 8 15 16 5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></polyline></svg>`;

        const blocks = [];
        document.querySelectorAll('div.highlight').forEach(el => blocks.push(el));
        document.querySelectorAll('pre').forEach(el => {
            if (!el.closest('div.highlight')) blocks.push(el);
        });

        blocks.forEach(block => {
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.setAttribute('aria-label', 'Copy code');
            btn.setAttribute('title', 'Copy');
            btn.innerHTML = COPY_ICON;

            btn.addEventListener('click', async () => {
                const code = block.querySelector('code');
                const text = code ? code.innerText : block.innerText;
                try {
                    await navigator.clipboard.writeText(text);
                    btn.innerHTML = CHECK_ICON;
                    setTimeout(() => {
                        btn.innerHTML = COPY_ICON;
                    }, 2000);
                } catch (e) {
                    // silent fail
                }
            });

            block.appendChild(btn);
        });
    </script>
</body>
</html>
