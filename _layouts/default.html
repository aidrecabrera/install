<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <style>
    :root {
      --color-paper-white: #ffffff;
      --color-pencil-gray: #ebebeb;
      --color-graphite: #a8a8a8;
      --color-smoke: #8e8e8e;
      --color-ink-black: #252525;
      --font-inter: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-inter);
      background: var(--color-paper-white);
      color: var(--color-ink-black);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding: 64px 32px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    h1, h2, h3, h4, h5, h6 {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.4;
      margin-top: 32px;
      margin-bottom: 8px;
    }

    h1 {
      border-bottom: 1px solid var(--color-pencil-gray);
      padding-bottom: 8px;
    }

    p {
      margin-bottom: 16px;
    }

    a {
      color: var(--color-ink-black);
      text-decoration: underline;
      text-underline-offset: 0.15em;
    }

    a:hover {
      color: #666666;
    }

    ul, ol {
      list-style: none;
      padding-left: 0;
      margin-bottom: 16px;
    }

    li {
      margin-bottom: 8px;
    }

    ul ul, ol ol, ul ol, ol ul {
      padding-left: 16px;
      margin-top: 8px;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      color: var(--color-ink-black);
      background: transparent;
      border: 1px solid var(--color-pencil-gray);
      padding: 2px 4px;
      border-radius: 0;
    }

    pre {
      border: 1px solid var(--color-pencil-gray);
      padding: 16px;
      overflow-x: auto;
      background: var(--color-paper-white);
      margin-bottom: 16px;
    }

    pre code {
      border: none;
      padding: 0;
    }

    hr {
      border: 0;
      border-top: 1px solid var(--color-pencil-gray);
      margin: 32px 0;
    }

    blockquote {
      border-left: 1px solid var(--color-pencil-gray);
      padding-left: 16px;
      color: var(--color-graphite);
      margin-bottom: 16px;
    }

    @media (max-width: 640px) {
      body {
        padding: 32px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
