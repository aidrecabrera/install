<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aidre</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #ffffff;
            --pencil: #ebebeb;
            --graphite: #a8a8a8;
            --ink: #252525;
            --font: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --ease: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: var(--font);
            background: var(--paper);
            color: var(--ink);
            font-size: 15px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-kerning: normal;
        }

        .shell {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 32px;
            max-width: 960px;
            margin: 0 auto;
            padding: 64px 32px;
        }

        aside {
            position: sticky;
            top: 64px;
            height: fit-content;
        }

        h1 {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.02em;
            line-height: 1.4;
        }

        .tagline {
            font-size: 12px;
            color: var(--graphite);
            line-height: 1.4;
            margin-top: 8px;
        }

        .divider {
            height: 1px;
            background: var(--pencil);
            margin-bottom: 32px;
        }

        .entry {
            margin-bottom: 32px;
        }

        .entry:last-child {
            margin-bottom: 0;
        }

        .entry a {
            position: relative;
            font-size: 15px;
            font-weight: 500;
            color: var(--ink);
            text-decoration: none;
            letter-spacing: -0.01em;
            transition: color 150ms var(--ease);
        }

        .entry a::before {
            content: '';
            position: absolute;
            inset: -10px;
        }

        .entry a:hover {
            color: var(--graphite);
        }

        .entry a:focus-visible {
            outline: 1px solid var(--pencil);
            outline-offset: 2px;
            border-radius: 2px;
        }

        .entry p {
            font-size: 12px;
            color: var(--graphite);
            line-height: 1.4;
            margin-top: 8px;
        }

        @media (max-width: 640px) {
            .shell {
                grid-template-columns: 1fr;
                padding: 32px 20px;
                gap: 32px;
            }

            aside {
                position: static;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .entry a {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <aside>
            <h1>Aidre Cabrera</h1>
            <p class="tagline">Internet Native</p>
        </aside>
        <main>
            <div class="divider"></div>
            <div class="entry">
                <a href="https://install.aidre.tech">install.aidre.tech</a>
                <p>One-line installers for WebHID and WebUSB devices.</p>
            </div>
            <div class="entry">
                <a href="https://github.com/aidrecabrera">github.com/aidrecabrera</a>
                <p>Code and projects.</p>
            </div>
        </main>
    </div>
</body>
</html>
